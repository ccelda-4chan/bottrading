services:
  - type: web
    name: bitget-bot
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python main.py
    envVars:
      - key: BITGET_API_KEY
        sync: false
      - key: BITGET_API_SECRET
        sync: false
      - key: BITGET_API_PASSPHRASE
        sync: false
      - key: BITGET_SYMBOLS
        value: "SBTCSUSDT,SETHSUSDT,SXRPSUSDT"
      - key: BITGET_INTERVAL
        value: "60"
